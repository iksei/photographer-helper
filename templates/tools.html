<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструменты фотографа</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="main-nav">
        <h1>Помощник <span>фотографа</span></h1>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/plan">Планирование</a>
            <a href="/tools" class="active">Инструменты</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">Инструменты фотографа</h2>
        <div class="card">
            <h2>Глубина резкости (DOF)</h2>
            <div class="dof-inputs">
                <div class="dof-row">
                    <label>Диафрагма (f/)</label>
                    <input type="number" id="dofAperture" value="2.8" step="0.1" min="1">
                </div>
                <div class="dof-row">
                    <label>Фокусное (мм)</label>
                    <input type="number" id="dofFocal" value="50" step="5" min="10">
                </div>
                <div class="dof-row">
                    <label>Расстояние (м)</label>
                    <input type="number" id="dofDistance" value="5" step="0.5" min="0.5">
                </div>
                <button id="dofBtn">Рассчитать</button>
            </div>
            <div id="dofResult" class="dof-result">
                <p>ГРИП: <strong id="dofValue">—</strong> м</p>
                <p class="detail-text">Ближняя граница: <span id="dofNear">—</span> м | Дальняя: <span id="dofFar">—</span> м</p>
                <p class="detail-text">Гиперфокальное расстояние: <span id="dofHyperfocal">—</span> м</p>
            </div>
        </div>

        <div class="card">
            <h2>Калькулятор выдержки (Sunny 16)</h2>
            <div class="shutter-inputs">
                <div class="shutter-row">
                    <label>ISO</label>
                    <input type="number" id="shutterISO" value="100" step="100" min="50">
                </div>
                <div class="shutter-row">
                    <label>Диафрагма (f/)</label>
                    <input type="number" id="shutterAperture" value="16" step="0.5" min="1">
                </div>
                <div class="shutter-row">
                    <label>EV (опционально)</label>
                    <input type="number" id="shutterEV" placeholder="Авто" step="0.5">
                </div>
                <button id="shutterBtn">Рассчитать</button>
            </div>
            <div id="shutterResult" class="shutter-result">
                <p>Рекомендуемая выдержка: <strong id="shutterValue">—</strong></p>
                <p class="detail-text">Точное значение: <span id="shutterExact">—</span> с</p>
            </div>
        </div>

        <div class="card">
            <h2>Снаряжение</h2>
            <div class="todo-input">
                <input type="text" id="todoInput" placeholder="Что взять на съёмку?">
                <button id="addTodoBtn">Добавить</button>
            </div>
            <ul class="todo-list" id="todoList">
                <li class="todo-empty">Загрузка...</li>
            </ul>
            <div class="todo-count" id="todoCount">0/0</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
